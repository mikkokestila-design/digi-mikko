<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Icon: wrench + person combined -->
  <circle cx="30" cy="30" r="26" fill="url(#grad1)"/>
  <circle cx="30" cy="30" r="23" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- M letter icon -->
  <g transform="translate(18, 16)" fill="white">
    <path d="M1,24 L1,2 L11,14 L21,2 L21,24 L17,24 L17,8 L11,17 L5,8 L5,24 Z" opacity="0.9"/>
  </g>
  <!-- Checkmark badge -->
  <circle cx="44" cy="44" r="10" fill="url(#grad2)"/>
  <polyline points="39,44 43,48 50,40" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Text: Digi-Mikko -->
  <text x="62" y="28" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#1e40af">Digi</text>
  <text x="103" y="28" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#2563eb">-</text>
  <text x="110" y="28" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#1e40af">Mikko</text>
  <!-- Tagline -->
  <text x="62" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" letter-spacing="0.5">Digituki ikäihmisille</text>
</svg>
